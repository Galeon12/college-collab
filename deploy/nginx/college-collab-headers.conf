# Security headers for the frontend. Carried over from the old Azure Static Web Apps config.
# These are APPLICATION BEHAVIOUR, not ops preference. Read before changing.
#
# This file must be `include`d in EVERY location block that serves HTML or assets.
#
# Why not just declare them once at the server{} level: nginx inherits add_header into a
# location ONLY IF that location declares no add_header of its own. The moment someone adds a
# Cache-Control inside `location = /index.html`, ALL of these silently vanish from the document
# -- including the COOP line below, which breaks Google sign-in. Never rely on that inheritance.

# LOAD-BEARING. Do not "harden" this to same-origin.
#
# src/components/AuthModal.jsx signs users in with Auth0's loginWithPopup(), then calls
# getIdTokenClaims(). That requires the popup and its opener to keep handles on each other
# across windows. Any stricter COOP (same-origin, same-origin-allow-popups) severs
# window.opener and Google sign-in HANGS FOREVER with nothing in the console to explain it.
add_header Cross-Origin-Opener-Policy   "unsafe-none"                     always;
add_header Cross-Origin-Embedder-Policy "unsafe-none"                     always;

add_header X-Content-Type-Options       "nosniff"                         always;
add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
